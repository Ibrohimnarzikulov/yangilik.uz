<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sahifa topilmadi</title>
</head>
<body style="margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; color: #334155;">

    <div style="text-align: center; padding: 20px; max-width: 500px; width: 100%;">
        <!-- Katta 404 raqami -->
        <h1 style="font-size: 120px; margin: 0; font-weight: 900; color: #6366f1; line-height: 1; letter-spacing: -0.05em; animation: pulse 2s infinite ease-in-out;">
            404
        </h1>

        <!-- Sarlavha -->
        <h2 style="font-size: 28px; margin-top: 20px; margin-bottom: 10px; color: #1e293b; font-weight: 700;">
            Sahifa topilmadi
        </h2>

        <!-- Tavsif matni -->
        <p style="font-size: 16px; color: #64748b; line-height: 1.6; margin-bottom: 30px;">
            Afsuski, siz qidirayotgan sahifa mavjud emas, o'chirilgan yoki manzili o'zgartirilgan bo'lishi mumkin.
        </p>

        <!-- Bosh sahifaga qaytish tugmasi -->
        <a href="/" style="display: inline-block; padding: 12px 30px; font-size: 16px; font-weight: 600; color: #ffffff; background-color: #6366f1; text-decoration: none; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); transition: all 0.2s ease;"
           onmouseover="this.style.backgroundColor='#4f46e5'; this.style.transform='translateY(-2px)';"
           onmouseout="this.style.backgroundColor='#6366f1'; this.style.transform='translateY(0)';"
           onmousedown="this.style.transform='translateY(1px)';">
            Bosh sahifaga qaytish
        </a>
    </div>

</body>
</html>
